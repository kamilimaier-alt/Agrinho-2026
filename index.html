<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora de Alimentos da Época</title>

<link rel="stylesheet" href="style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header>

<div class="hero">

<h1>🌱 Calculadora de Alimentos da Época</h1>

<p>
Descubra frutas, verduras e legumes da estação e faça escolhas mais sustentáveis.
</p>

</div>

</header>

<div class="container">

<div class="search-box">

<label>Escolha o mês</label>

<select id="mes">

<option value="1">Janeiro</option>
<option value="2">Fevereiro</option>
<option value="3">Março</option>
<option value="4">Abril</option>
<option value="5">Maio</option>
<option value="6">Junho</option>
<option value="7">Julho</option>
<option value="8">Agosto</option>
<option value="9">Setembro</option>
<option value="10">Outubro</option>
<option value="11">Novembro</option>
<option value="12">Dezembro</option>

</select>

<button id="btnMostrar">
🔍 Consultar
</button>

</div>

<div id="listaAlimentos" class="cards"></div>

</div>

<script src="script.js"></script>

</body>
</html>
